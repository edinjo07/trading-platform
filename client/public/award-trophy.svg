<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="cupGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="25%"  stop-color="#fde68a"/>
      <stop offset="60%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="cupGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="shineGrad" cx="40%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#fffbeb" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Laurel wreath left ── -->
  <g fill="#f59e0b" opacity="0.8">
    <ellipse cx="13" cy="50" rx="5.5" ry="2.5" transform="rotate(-15 13 50)"/>
    <ellipse cx="11" cy="39" rx="5.5" ry="2.5" transform="rotate(-30 11 39)"/>
    <ellipse cx="14" cy="29" rx="5.5" ry="2.5" transform="rotate(-46 14 29)"/>
    <ellipse cx="22" cy="21" rx="5.5" ry="2.5" transform="rotate(-62 22 21)"/>
    <ellipse cx="14" cy="61" rx="5.5" ry="2.5" transform="rotate(6 14 61)"/>
    <ellipse cx="19" cy="72" rx="5.5" ry="2.5" transform="rotate(22 19 72)"/>
    <ellipse cx="28" cy="80" rx="5.5" ry="2.5" transform="rotate(40 28 80)"/>
    <path d="M10 50 Q7 39 12 27" stroke="#f59e0b" stroke-width="1.4" fill="none" opacity="0.55"/>
    <path d="M10 50 Q7 63 14 74" stroke="#f59e0b" stroke-width="1.4" fill="none" opacity="0.55"/>
  </g>

  <!-- ── Laurel wreath right ── -->
  <g fill="#f59e0b" opacity="0.8">
    <ellipse cx="107" cy="50" rx="5.5" ry="2.5" transform="rotate(15 107 50)"/>
    <ellipse cx="109" cy="39" rx="5.5" ry="2.5" transform="rotate(30 109 39)"/>
    <ellipse cx="106" cy="29" rx="5.5" ry="2.5" transform="rotate(46 106 29)"/>
    <ellipse cx="98"  cy="21" rx="5.5" ry="2.5" transform="rotate(62 98 21)"/>
    <ellipse cx="106" cy="61" rx="5.5" ry="2.5" transform="rotate(-6 106 61)"/>
    <ellipse cx="101" cy="72" rx="5.5" ry="2.5" transform="rotate(-22 101 72)"/>
    <ellipse cx="92"  cy="80" rx="5.5" ry="2.5" transform="rotate(-40 92 80)"/>
    <path d="M110 50 Q113 39 108 27" stroke="#f59e0b" stroke-width="1.4" fill="none" opacity="0.55"/>
    <path d="M110 50 Q113 63 106 74" stroke="#f59e0b" stroke-width="1.4" fill="none" opacity="0.55"/>
  </g>

  <!-- ── Laurel bottom knot ── -->
  <circle cx="60" cy="88" r="4.5" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <circle cx="60" cy="88" r="2"   fill="#f59e0b" opacity="0.6"/>

  <!-- ── Trophy cup body ── -->
  <path d="M32 14 H88 L84 58 Q82 68 60 70 Q38 68 36 58 Z" fill="url(#cupGrad)"/>

  <!-- Cup shine overlay -->
  <path d="M32 14 H88 L84 58 Q82 68 60 70 Q38 68 36 58 Z" fill="url(#shineGrad)"/>

  <!-- Inner rim detail -->
  <path d="M34 18 H86" stroke="#fef9c3" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- ── Left handle ── -->
  <path d="M32 22 Q15 22 15 38 Q15 54 32 54" fill="none" stroke="url(#cupGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M32 22 Q18 22 18 38 Q18 54 32 54" fill="none" stroke="url(#cupGradH)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- ── Right handle ── -->
  <path d="M88 22 Q105 22 105 38 Q105 54 88 54" fill="none" stroke="url(#cupGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 22 Q102 22 102 38 Q102 54 88 54" fill="none" stroke="url(#cupGradH)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- ── Stem ── -->
  <path d="M52 70 L52 86 Q52 90 56 91 L64 91 Q68 90 68 86 L68 70 Z" fill="url(#baseGrad)"/>
  <rect x="53" y="70" width="6" height="18" fill="rgba(255,255,255,0.12)" rx="1"/>

  <!-- ── Base platform ── -->
  <rect x="36" y="91"  width="48" height="9"  fill="url(#baseGrad)" rx="4"/>
  <rect x="30" y="100" width="60" height="10" fill="url(#baseGrad)" rx="5"/>
  <rect x="30" y="100" width="60" height="4"  fill="rgba(255,255,255,0.14)" rx="3"/>

  <!-- ── Ribbon banner ── -->
  <path d="M30 110 L20 118 L30 115 L60 116.5 L90 115 L100 118 L90 110 Z" fill="#f59e0b" opacity="0.55"/>
  <path d="M30 110 L90 110" stroke="#fde68a" stroke-width="0.8" opacity="0.4"/>

  <!-- ── Engraved star on cup ── -->
  <path d="M60 25 l3 9.2h9.6l-7.8 5.7 3 9.2L60 44.3l-7.8 5.8 3-9.2-7.8-5.7H57Z"
        fill="#fef9c3" opacity="0.92" filter="url(#softGlow)"/>

  <!-- ── Top star accent ── -->
  <path d="M60 8 l1.6 5h5.3l-4.3 3.1 1.6 5L60 18.1l-4.2 3 1.6-5-4.3-3.1h5.3Z"
        fill="#f59e0b" filter="url(#glow)" opacity="0.9"/>
</svg>
